name: sync-public-demo

on:
  push:
    branches:
      - main
    paths-ignore:
      - dist/**
      - index.html
      - .nojekyll
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: |
          if git diff --quiet -- dist index.html .nojekyll; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist index.html .nojekyll
          git commit -m "Update public demo [skip ci]"
          git push
